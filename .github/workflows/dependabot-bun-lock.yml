# Dependabot sometimes opens PRs that bump package.json before bun.lock is in sync.
# Regenerate the lockfile and push to the same branch so CI can use --frozen-lockfile.

name: Dependabot bun.lock sync

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: write

concurrency:
  group: dependabot-bun-lock-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-lockfile:
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Regenerate bun.lock
        run: bun install

      - name: Commit and push if lockfile changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          if git diff --cached --quiet; then
            echo "bun.lock already matches package.json"
            exit 0
          fi
          git commit -m "chore(deps): sync bun.lock"
          git push
